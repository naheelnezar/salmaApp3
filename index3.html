<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تطبيق سلمى التعليمي</title>
    <style>
        :root { --primary: #27ae60; --secondary: #f1c40f; --dark: #2d3436; --orange: #e67e22; --blue: #2980b9; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #4facfe; display: flex; flex-direction: column; align-items: center; height: 100vh; overflow: hidden; transition: 1s; -webkit-tap-highlight-color: transparent; }
        .night-mode { background: #1e3c72 !important; }

        /* الشاشات */
        .screen { position: fixed; inset: 0; background: #fdfdfd; z-index: 3000; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; text-align: center; }
        
        /* نصوص الشاشات (ملونة بدلاً من الأبيض) */
        h1, h2, h3, p { color: var(--dark); margin: 10px 0; }
        
        input { padding: 12px; font-size: 18px; border-radius: 10px; border: 2px solid var(--primary); margin: 15px; width: 80%; max-width: 300px; text-align: center; outline: none; color: var(--dark); }
        button { padding: 12px 30px; font-size: 18px; cursor: pointer; background: var(--primary); color: #fff; border: none; border-radius: 50px; box-shadow: 0 4px #1b7e46; font-weight: bold; }
        button:active { transform: translateY(2px); box-shadow: 0 2px #1b7e46; }
        
        /* واجهة اللعبة */
        #dashboard { width: 90%; display: flex; justify-content: space-around; padding: 15px; background: rgba(0,0,0,0.1); border-radius: 15px; margin-top: 10px; box-sizing: border-box; }
        .bar-outer { width: 80px; height: 12px; background: rgba(0,0,0,0.2); border-radius: 10px; margin-top: 5px; }
        .bar-inner { height: 100%; width: 0%; border-radius: 10px; transition: 0.3s; }
        .label { color: var(--dark); font-weight: bold; font-size: 14px; }
        .night-mode .label { color: #fff; }

        #formula-box { background: rgba(0,0,0,0.8); color: #fab1a0; padding: 12px; margin: 10px; border-radius: 10px; font-size: 14px; width: 85%; text-align: center; min-height: 40px; display: flex; align-items: center; justify-content: center; font-weight: bold; }

        #game-area { flex-grow: 1; width: 100%; position: relative; display: flex; justify-content: center; align-items: center; }
        #plant { font-size: 100px; transition: 0.4s; cursor: pointer; user-select: none; }
        
        .resource { position: absolute; font-size: 35px; cursor: pointer; animation: fall 3s linear forwards; }
        @keyframes fall { to { transform: translateY(60vh); opacity: 0; } }

        /* الاختبار والشهادة */
        .quiz-card { background: #fff; padding: 20px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); width: 90%; max-width: 400px; }
        #q-text { color: var(--blue); } /* سؤال الاختبار باللون الأزرق */
        
        .opt { display: block; width: 100%; padding: 12px; margin: 10px 0; background: #f1f2f6; border-radius: 8px; cursor: pointer; border: 2px solid #dfe4ea; font-weight: bold; color: var(--dark); }
        .opt:hover { background: #dfe4ea; border-color: var(--blue); }
        
        #certificate { 
            background: #fff; 
            border: 8px double var(--primary); 
            padding: 40px 20px; 
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            width: 85%;
            max-width: 500px;
        }

        /* اسم الطالب برتقالي */
        #cert-name-display { 
            color: var(--orange); 
            font-size: 32px; 
            margin: 15px 0; 
            border-bottom: 2px solid #eee; 
            display: inline-block; 
            padding: 0 20px; 
            font-weight: bold;
        }

        #score-text { color: var(--blue); font-size: 45px; margin: 10px 0; font-weight: bold; }
        #eval-text { font-weight: bold; color: var(--primary); font-size: 18px; }

        #time-btn {
            padding: 15px 40px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 50px;
            border: none;
            background: var(--dark);
            color: white;
            cursor: pointer;
            margin-bottom: 30px;
            box-shadow: 0 5px #000;
            z-index: 100;
        }
    </style>
</head>
<body>

<div id="start-screen" class="screen">
    <h1 style="color: var(--primary);">🌱 مختبر النبات الذكي</h1>
    <p style="color: var(--blue); font-weight: bold;">أهلاً بك يا بطل المستقبل، ما هو اسمك؟</p>
    <input type="text" id="player-input" placeholder="اكتب اسمك هنا...">
    <button onclick="startGame()">ابدأ التحدي</button>
</div>

<div id="quiz-screen" class="screen" style="display: none;">
    <div class="quiz-card">
        <h2 id="q-text">السؤال</h2>
        <div id="options"></div>
    </div>
</div>

<div id="cert-screen" class="screen" style="display: none;">
    <div id="certificate">
        <h2 style="color: var(--primary); margin: 0;">شهادة تفوق</h2>
        <p style="color: var(--dark); font-weight: bold;">نفتخر بأن الطالب/ة:</p>
        <h1 id="cert-name-display">الاسم</h1>
        <p style="color: var(--dark);">قد اجتاز تحدي البناء الضوئي بنجاح بنسبة:</p>
        <h1 id="score-text">0%</h1>
        <p id="eval-text">ممتاز!</p>
        <br>
        <button onclick="location.reload()" style="background: var(--orange); box-shadow: 0 4px #b35c1a;">إعادة المحاولة 🔄</button>
    </div>
</div>

<div id="dashboard">
    <div>
        <div class="label">مخزون السكر</div>
        <div class="bar-outer"><div id="sugar-bar" class="bar-inner" style="background:var(--secondary);"></div></div>
    </div>
    <div>
        <div class="label">مستوى النمو</div>
        <div class="bar-outer"><div id="growth-bar" class="bar-inner" style="background:var(--primary);"></div></div>
    </div>
</div>

<div id="formula-box" id="formula">6CO₂ + 6H₂O + الضوء ⮕ سكر + أكسجين</div>

<div id="game-area">
    <div id="plant" onclick="interact()">🌱</div>
</div>

<button id="time-btn" onclick="toggle()">تحويل لوضع الليل 🌙</button>

<script>
    let studentName = ""; 
    let sugar = 0, growth = 0, isNight = false, score = 0, currentQ = 0;

    const questions = [
        {q: "ماذا يحتاج النبات للقيام بالبناء الضوئي؟", a: ["ضوء وشمس", "لحم", "حليب"], c: 0},
        {q: "ما الغاز الذي يطلقه النبات في النهار؟", a: ["النيتروجين", "الأكسجين", "ثاني أكسيد الكربون"], c: 1},
        {q: "متى يستهلك النبات السكر لينمو؟", a: ["في الليل", "لا يستهلكه", "وقت المطر"], c: 0},
        {q: "أين تتم عملية البناء الضوئي؟", a: ["في الجذور", "في الأوراق الخضراء", "في التربة"], c: 1},
        {q: "المادة التي تعطي النبات لونه الأخضر هي:", a: ["الكلوروفيل", "الحديد", "الكالسيوم"], c: 0}
    ];

    function startGame() {
        studentName = document.getElementById('player-input').value;
        if(studentName.trim() === "") {
            alert("من فضلك اكتب اسمك لكي نضعه في الشهادة!");
            return;
        }
        document.getElementById('start-screen').style.display = 'none';
    }

    function toggle() {
        isNight = !isNight;
        document.body.classList.toggle('night-mode');
        const btn = document.getElementById('time-btn');
        btn.innerText = isNight ? "تحويل للنهار ☀️" : "تحويل لليل 🌙";
        document.getElementById('formula-box').innerText = isNight ? "سكر + أكسجين ⮕ طاقة + 6CO₂ + 6H₂O" : "6CO₂ + 6H₂O + الضوء ⮕ سكر + أكسجين";
    }

    function spawn() {
        if(isNight || growth >= 100) return;
        const res = document.createElement('div');
        res.className = 'resource';
        res.innerText = ['☀️', '💧', '☁️'][Math.floor(Math.random()*3)];
        res.style.left = Math.random()*80 + 10 + "%";
        res.style.top = "10%";
        document.getElementById('game-area').appendChild(res);
        res.onclick = () => { sugar = Math.min(100, sugar+10); update(); res.remove(); };
        setTimeout(() => { if(res.parentNode) res.remove(); }, 3000);
    }

    function interact() {
        if(isNight && sugar >= 10) {
            sugar -= 10; growth += 10; update();
            if(growth >= 100) setTimeout(startQuiz, 500);
        }
    }

    function update() {
        document.getElementById('sugar-bar').style.width = sugar + "%";
        document.getElementById('growth-bar').style.width = growth + "%";
        const p = document.getElementById('plant');
        if(growth > 30) p.innerText = "🌿";
        if(growth > 70) p.innerText = "🌳";
        p.style.transform = `scale(${1 + growth/100})`;
    }

    function startQuiz() {
        document.getElementById('quiz-screen').style.display = 'flex';
        showQuestion();
    }

    function showQuestion() {
        if(currentQ >= questions.length) return showCert();
        const q = questions[currentQ];
        document.getElementById('q-text').innerText = q.q;
        const opts = document.getElementById('options');
        opts.innerHTML = "";
        q.a.forEach((opt, i) => {
            const b = document.createElement('div');
            b.className = 'opt';
            b.innerText = opt;
            b.onclick = () => { if(i === q.c) score += 20; currentQ++; showQuestion(); };
            opts.appendChild(b);
        });
    }

    function showCert() {
        document.getElementById('quiz-screen').style.display = 'none';
        document.getElementById('cert-screen').style.display = 'flex';
        document.getElementById('cert-name-display').innerText = studentName;
        document.getElementById('score-text').innerText = score + "%";
        if(score === 100) document.getElementById('eval-text').innerText = "أنت عبقري/ة نباتات مذهل/ة! 🏆";
        else if(score >= 60) document.getElementById('eval-text').innerText = "أحسنت جداً، معلوماتك رائعة! ⭐";
        else document.getElementById('eval-text').innerText = "جيد، حاول مرة أخرى لتصبح خبيراً! 👍";
    }

    setInterval(spawn, 2000);
</script>
</body>
</html>
